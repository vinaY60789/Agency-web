<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Website</title>
    <!-- 
      YAHAN AAPKI PURANI CSS/STYLES AND HEAD ELEMENTS SAME TO SAME RAHENGE.
      ZAROORI BADLAV: Humne niche Firestore ki SDK library script ko add kar diya hai 
      taaki Firebase Database bina kisi dikkat ke kaam kare.
    -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>
    <!-- Zaroori Script for Database (Humne naya joda hai) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* Aapki website ki saari purani CSS styling yahan same to same rahegi */
        /* UI aur layout mein koi badlav nahi kiya gaya hai */
        .chats-container, .chat-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            font-family: sans-serif;
            font-size: 15px;
        }
        .user-message {
            background-color: #d9fdd3; /* Light Green for User */
            align-self: flex-end;
            margin-left: auto;
        }
        .bot-message {
            background-color: #ffffff; /* White for Bot */
            align-self: flex-start;
            margin-right: auto;
            border: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>

    <!-- Aapka pura HTML Body, Section, Chatbot container, Form, Input Elements sab same to same rahega -->
    
    <!-- Chat container jahan messages show hote hain, usme classes/id check kar lein -->
    <div class="chat-box" id="chatArea">
        <!-- Messages yahan dynamically javascript se add honge -->
    </div>

    <!-- Input box aur send button -->
    <div class="input-container">
        <input type="text" id="msg" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">Send</button>
    </div>


    <!-- ==================== JAVASCRIPT LOGIC ==================== -->
    <script>
        // 1. Aapka Firebase Configuration (Yahan apni sahi keys bharein)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };

        // Firebase ko initialize karna (Agar pehle se initialized na ho)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // Firestore database ka instance create karna
        const db = firebase.firestore();

        // 2. Aapke page ka baaki puraana JS code (bookingForm listeners, baki functions) same to same yahan rahega.

        
        // 3. SCREEN PAR MESSAGE DISPLAY KARNE KA FUNCTION
        // (Yeh bina kisi alert ke chat messages ko user aur bot ke roop mein screen par jodega)
        function appendMessage(sender, text) {
            let chatBox = document.getElementById("chatArea") || document.querySelector(".chat-box");
            if (!chatBox) return;

            let messageDiv = document.createElement("div");
            // Agar sender user hai toh class 'user-message' milegi, nahi toh 'bot-message'
            messageDiv.className = `message ${sender}-message`;
            messageDiv.innerText = text;

            chatBox.appendChild(messageDiv);
            
            // Chat screen ko automatic roll karke sabse niche laane ke liye
            chatBox.scrollTop = chatBox.scrollHeight;
        }


        // 4. CHATBOT KA NAYA INTEGRATED SEND FUNCTION
        // (Yeh purane alert wale function ki jagah kaam karega)
        function send() {
            let msgInput = document.getElementById("msg");
            let message = msgInput.value.trim();

            if (message !== "") {
                // Pehle turant screen par user ka message dikha do
                appendMessage("user", message);
                msgInput.value = ""; // Input box ko khali karo

                // Firebase Firestore ke "chats" collection mein data save karna
                // 'prompt' field ko read karke Firebase Gemini Extension auto-reply generate karega
                db.collection("chats").add({
                    prompt: message,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then((docRef) => {
                    console.log("Message sent to Firebase server. ID: ", docRef.id);
                    
                    // Ab is particular message ke reply ke liye server par real-time listen karenge
                    listenForBotReply(docRef.id);
                })
                .catch((error) => {
                    console.error("Firebase database error: ", error);
                });
            }
        }


        // 5. SERVER SE REAL-TIME REPLY TRACK KARNE KA FUNCTION
        function listenForBotReply(docId) {
            // Firebase real-time listener jo us document par nazar rakhega
            const unsubscribe = db.collection("chats").doc(docId).onSnapshot((doc) => {
                const data = doc.data();
                
                // Jab Firebase Gemini Extension reply taiyar karke database mein 'response' naam ka field jod dega:
                if (data && data.response) {
                    // Chatbot ka reply screen par display karein
                    appendMessage("bot", data.response);
                    
                    // Ek baar reply milne ke baad listener ko band (unsubscribe) kar dein taaki loop na bane
                    unsubscribe();
                }
            }, (error) => {
                console.error("Error listening for reply: ", error);
            });
        }
    </script>
</body>
</html>
